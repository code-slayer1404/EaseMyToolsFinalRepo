<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <script type="text/javascript">
        // This script takes the URL that 404ed and turns it into a parameter
        var l = window.location;
        // The '1' below is because your project is in a subfolder (/EaseMyTools/)
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 2).join('/') + '/?/' +
            l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.replace(/&/g, '~and~') : '') +
            l.hash
        );
    </script>
</head>

</html>
